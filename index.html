<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 현황 관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #eef2f7;
    --surface: #ffffff;
    --border: #d8e2ed;
    --text: #182235;
    --text-muted: #5c6f87;
    --primary: #1e3a5c;
    --primary-light: #deeaf7;
    --primary-hover: #15304f;

    --status-대기: #8496ab;
    --status-진행중: #2563eb;
    --status-수주: #059669;
    --status-수행: #d97706;
    --status-완료: #475569;
    --status-실주: #dc2626;
    --status-보류: #a8b8c8;

    --p1: #dc2626;
    --p2: #d97706;
    --p3: #65a30d;

    --shadow-sm: 0 1px 3px rgba(30,58,92,0.06), 0 1px 2px rgba(30,58,92,0.04);
    --shadow-md: 0 4px 12px rgba(30,58,92,0.08), 0 2px 4px rgba(30,58,92,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: var(--primary);
    border-bottom: none;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.02em;
  }
  .header .updated { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .unsaved-badge {
    font-size: 11px;
    color: #92400e;
    background: #fef3c7;
    border: 1px solid #fde68a;
    border-radius: 6px;
    padding: 4px 10px;
    display: none;
    font-weight: 600;
  }
  .unsaved-badge.show { display: block; }

  /* ── Controls ── */
  .controls {
    padding: 20px 28px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .quick-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .quick-filters label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-right: 4px; }

  .btn-filter {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-filter:hover { border-color: var(--primary); color: var(--primary); }
  .btn-filter.active { background: var(--primary); color: white; border-color: var(--primary); }

  .cat-tabs {
    display: flex;
    gap: 4px;
    border-bottom: 2px solid var(--border);
  }
  .cat-tab {
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    border: none;
    background: transparent;
    position: relative;
    bottom: -2px;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .cat-tab:hover { color: var(--primary); }
  .cat-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
  .cat-tab .badge {
    display: inline-block;
    background: var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 4px;
  }
  .cat-tab.active .badge { background: var(--primary-light); color: var(--primary); }

  .tag-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag-filters label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-right: 4px; }
  .tag-chip {
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
  }
  .tag-chip:hover { border-color: var(--primary); }
  .tag-chip.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

  .search-row {
    display: flex;
    gap: 8px;
  }
  .search-input {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    width: 220px;
    outline: none;
  }
  .search-input:focus { border-color: var(--primary); }

  /* ── Table ── */
  .table-wrap {
    padding: 0 28px 28px;
  }
  .table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .result-count {
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f4f8fc; }
  th {
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--primary); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; color: var(--primary); }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--primary-light); transition: background 0.1s; }

  .col-title { min-width: 160px; max-width: 200px; }
  .col-client { min-width: 100px; white-space: nowrap; }
  .col-status { width: 80px; }
  .col-category { width: 60px; }
  .col-priority { width: 60px; text-align: center; }
  .col-deadline { width: 90px; white-space: nowrap; }
  .col-update { width: 50px; text-align: center; }
  .col-progress { min-width: 200px; }

  /* ── Badges ── */
  .badge-status {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .s-대기 { background: #f1f5f9; color: var(--status-대기); }
  .s-진행중 { background: #dbeafe; color: #1d4ed8; }
  .s-수주 { background: #d1fae5; color: #065f46; }
  .s-수행 { background: #fef3c7; color: #92400e; }
  .s-완료 { background: #f0fdf4; color: #166534; }
  .s-실주 { background: #fee2e2; color: #991b1b; }
  .s-보류 { background: #f8fafc; color: #94a3b8; }

  .badge-cat {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
  }
  .c-제안 { background: #ede9fe; color: #5b21b6; }
  .c-수행 { background: #fce7f3; color: #9d174d; }
  .c-R\&D { background: #e0f2fe; color: #0c4a6e; }
  .c-기타 { background: #f0fdf4; color: #166534; }

  .priority-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .p1 { background: var(--p1); }
  .p2 { background: var(--p2); }
  .p3 { background: var(--p3); }

  .deadline-chip {
    font-size: 12px;
  }
  .deadline-chip.urgent { color: var(--p1); font-weight: 700; }
  .deadline-chip.soon { color: var(--p2); font-weight: 600; }

  .update-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--status-진행중);
    display: inline-block;
    margin: 0 auto;
  }

  .tags-cell { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .tag-mini {
    font-size: 10px;
    background: #f1f5f9;
    color: #64748b;
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* ── Progress expand ── */
  .progress-toggle {
    cursor: pointer;
    color: var(--primary);
    font-size: 11px;
    background: none;
    border: none;
    padding: 0;
    margin-top: 4px;
    display: block;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text);
    white-space: pre-line;
    max-width: 400px;
  }
  .progress-text.collapsed {
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .next-plan { font-size: 11px; color: #059669; margin-top: 4px; }
  .notes-text { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .notes-text a { color: var(--primary); }

  /* ── Grouping view ── */
  .group-header {
    background: #f8fafc;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Empty state ── */
  .empty-state {
    padding: 48px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Edit modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 24px;
    width: 600px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1/-1; }
  .form-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--primary); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s, background 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn-cancel { background: var(--bg); color: var(--text-muted); }
  .btn-save { background: var(--primary); color: white; }
  .btn-delete { background: #fee2e2; color: #991b1b; margin-right: auto; }
  .btn-export { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

  @media (max-width: 768px) {
    .col-category, .col-priority, .col-update { display: none; }
    .header-right { display: none; }
    .controls { padding: 16px 16px 12px; }
    .table-wrap { padding: 0 12px 20px; }
    .header { padding: 14px 16px; }
    .view-toggle-bar { padding: 0 12px 10px; }
    .weekly-wrap { padding: 0 12px 20px; }
    .week-item { grid-template-columns: 1fr 80px; }
    .week-item-client { display: none; }
  }

  /* ── View Toggle ── */
  .view-toggle-bar { padding: 0 28px 12px; display: flex; align-items: center; gap: 12px; }
  .result-count-text { font-size: 12px; color: var(--text-muted); }
  .view-toggle { display: flex; gap: 3px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; width: fit-content; }
  .view-btn { padding: 6px 18px; border-radius: 7px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; font-family: inherit; }
  .view-btn:hover { color: var(--primary); }
  .view-btn.active { background: var(--surface); color: var(--primary); font-weight: 700; box-shadow: var(--shadow-sm); }

  /* ── Weekly View ── */
  .weekly-wrap { padding: 0 28px 28px; display: none; }
  .weekly-wrap.show { display: block; }
  .table-wrap.hide { display: none; }
  .week-section { margin-bottom: 14px; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .week-header { display: flex; align-items: center; gap: 8px; padding: 11px 16px; background: var(--primary); color: white; font-size: 13px; font-weight: 700; cursor: pointer; user-select: none; }
  .week-header .week-label { flex: 1; letter-spacing: -0.01em; }
  .week-header .week-count { font-size: 11px; background: rgba(255,255,255,0.18); border-radius: 10px; padding: 2px 9px; font-weight: 600; }
  .week-header .week-toggle { font-size: 11px; opacity: 0.65; margin-left: 4px; }
  .week-header.past { background: #4a5e72; }
  .week-body { background: var(--surface); border: 1px solid var(--border); border-top: none; overflow: hidden; }
  .week-body.collapsed { display: none; }
  .week-item { display: grid; grid-template-columns: 200px 110px 90px 1fr; gap: 12px; align-items: start; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .week-item:last-child { border-bottom: none; }
  .week-item:hover { background: var(--primary-light); }
  .week-item-title { font-weight: 600; font-size: 13px; color: var(--text); }
  .week-item-client { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .week-item-status { font-size: 12px; }
  .week-item-note { font-size: 12px; color: var(--text-muted); white-space: pre-line; line-height: 1.55; }
  .week-empty { padding: 28px; text-align: center; color: var(--text-muted); font-size: 13px; }

  /* ── Weekly Update in Modal ── */
  .wu-add-row { display: flex; gap: 6px; margin-top: 8px; }
  .wu-add-row input[type="date"] { width: 140px; }
  .wu-add-row input[type="text"] { flex: 1; }
  .wu-add-btn { padding: 6px 14px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 600; white-space: nowrap; transition: opacity 0.15s; }
  .wu-add-btn:hover { opacity: 0.85; }
  .weekly-update-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; }
  .weekly-update-item { display: flex; gap: 8px; align-items: center; padding: 7px 10px; background: var(--bg); border-radius: 7px; font-size: 12px; border: 1px solid var(--border); }
  .weekly-update-item .wu-week { color: var(--primary); font-weight: 600; white-space: nowrap; min-width: 90px; }
  .weekly-update-item .wu-note { flex: 1; color: var(--text); }
  .weekly-update-item .wu-del { cursor: pointer; color: var(--text-muted); background: none; border: none; font-size: 14px; padding: 0 4px; line-height: 1; transition: color 0.1s; }
  .weekly-update-item .wu-del:hover { color: #991b1b; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 업무 현황 관리</h1>
    <div class="updated" id="last-updated"></div>
  </div>
  <div class="header-right">
    <span class="unsaved-badge" id="unsaved-badge">⚠️ 미저장 변경 있음 — JSON 내보내기 필요</span>
    <button class="btn btn-save" onclick="openAddModal()">+ 프로젝트 추가</button>
    <button class="btn btn-export" onclick="exportJSON()">⬇ JSON 내보내기</button>
  </div>
</div>


<div class="controls">
  <!-- 퀵필터 -->
  <div class="quick-filters">
    <label>빠른 필터</label>
    <button class="btn-filter" data-quick="weekly" onclick="toggleQuick(this)">📌 금주 업데이트</button>
    <button class="btn-filter" data-quick="p1" onclick="toggleQuick(this)">🚨 1순위</button>
    <button class="btn-filter" data-quick="urgent" onclick="toggleQuick(this)">⏰ 기한 임박 (7일)</button>
    <button class="btn-filter" data-quick="active" onclick="toggleQuick(this)">🏃 진행중만</button>
    <button class="btn-filter" data-quick="group" onclick="toggleQuick(this)">🏢 고객사별 그룹</button>
  </div>

  <!-- 카테고리 탭 -->
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" data-cat="전체" onclick="setCat(this)">전체 <span class="badge" id="badge-전체">0</span></button>
    <button class="cat-tab" data-cat="제안" onclick="setCat(this)">제안 <span class="badge" id="badge-제안">0</span></button>
    <button class="cat-tab" data-cat="수행" onclick="setCat(this)">수행 <span class="badge" id="badge-수행">0</span></button>
    <button class="cat-tab" data-cat="R&D" onclick="setCat(this)">R&D <span class="badge" id="badge-R&D">0</span></button>
    <button class="cat-tab" data-cat="기타" onclick="setCat(this)">기타 <span class="badge" id="badge-기타">0</span></button>
  </div>

  <!-- 태그 필터 -->
  <div class="tag-filters" id="tag-filters">
    <label>태그</label>
  </div>

  <!-- 검색 -->
  <div class="search-row">
    <input class="search-input" type="text" id="search" placeholder="프로젝트명 또는 고객사 검색…" oninput="render()">
  </div>
</div>

<div class="view-toggle-bar">
  <div class="view-toggle">
    <button class="view-btn active" id="btn-list-view" onclick="setView('list')">📋 목록</button>
    <button class="view-btn" id="btn-weekly-view" onclick="setView('weekly')">📅 주차별</button>
  </div>
  <span class="result-count-text" id="result-count"></span>
</div>

<div class="table-wrap" id="list-wrap">
  <div class="table-container">
    <div id="table-body"></div>
  </div>
</div>

<div class="weekly-wrap" id="weekly-wrap">
  <div id="weekly-body"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">프로젝트 추가</h2>
    <div class="form-grid">
      <div class="form-group full"><label>프로젝트명 *</label><input id="f-title" type="text" placeholder="프로젝트명"></div>
      <div class="form-group"><label>고객사</label><input id="f-client" type="text" placeholder="고객사명"></div>
      <div class="form-group"><label>구분</label>
        <select id="f-category">
          <option>제안</option><option>수행</option><option>R&D</option><option>기타</option>
        </select>
      </div>
      <div class="form-group"><label>상태</label>
        <select id="f-status">
          <option>대기</option><option>진행중</option><option>수주</option><option>수행</option><option>완료</option><option>실주</option><option>보류</option>
        </select>
      </div>
      <div class="form-group"><label>우선순위</label>
        <select id="f-priority">
          <option value="">없음</option><option value="1">1순위</option><option value="2">2순위</option><option value="3">3순위</option>
        </select>
      </div>
      <div class="form-group"><label>기한</label><input id="f-deadline" type="date"></div>
      <div class="form-group"><label>담당자</label><input id="f-owner" type="text" placeholder="담당자명"></div>
      <div class="form-group" style="justify-content:flex-end;padding-top:20px">
        <label style="flex:none">
          <input type="checkbox" id="f-weekly"> 금주 업데이트 대상
        </label>
      </div>
      <div class="form-group full"><label>진행 현황</label><textarea id="f-progress" placeholder="현재 진행 상황"></textarea></div>
      <div class="form-group full"><label>향후 계획</label><textarea id="f-nextplan" placeholder="향후 계획" style="min-height:60px"></textarea></div>
      <div class="form-group full"><label>비고</label><textarea id="f-notes" placeholder="비고 / 링크" style="min-height:60px"></textarea></div>
      <div class="form-group full">
        <label>주간 업데이트 내역</label>
        <div class="wu-add-row">
          <input type="date" id="f-wu-date" title="해당 주 월요일">
          <input type="text" id="f-wu-note" placeholder="주간 업데이트 내용 입력…">
          <button class="wu-add-btn" onclick="addWeeklyUpdate()">+ 추가</button>
        </div>
        <div class="weekly-update-list" id="wu-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-delete" id="btn-delete" onclick="deleteProject()" style="display:none">삭제</button>
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-save" onclick="saveProject()">저장</button>
    </div>
  </div>
</div>

<script>
let DATA = { projects: [] };
let currentCat = '전체';
let activeQuick = new Set();
let activeTags = new Set();
let sortKey = 'deadline';
let sortDir = -1;
let editingId = null;
let currentView = 'list';
let modalWeeklyUpdates = [];

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.ceil((d - TODAY) / 86400000);
}

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    DATA = await res.json();
    document.getElementById('last-updated').textContent = '최종 업데이트: ' + DATA.lastUpdated;
  } catch(e) {
    DATA = { projects: [], tagOptions: [] };
  }
  buildTagChips();
  updateBadges();
  render();
}

function buildTagChips() {
  const container = document.getElementById('tag-filters');
  const tags = DATA.tagOptions || [...new Set(DATA.projects.flatMap(p => p.tags || []))].sort();
  tags.forEach(tag => {
    const chip = document.createElement('button');
    chip.className = 'tag-chip';
    chip.textContent = tag;
    chip.dataset.tag = tag;
    chip.onclick = () => toggleTag(chip);
    container.appendChild(chip);
  });
}

function toggleTag(chip) {
  const tag = chip.dataset.tag;
  if (activeTags.has(tag)) { activeTags.delete(tag); chip.classList.remove('active'); }
  else { activeTags.add(tag); chip.classList.add('active'); }
  render();
}

function toggleQuick(btn) {
  const key = btn.dataset.quick;
  if (key === 'group') {
    btn.classList.toggle('active');
    activeQuick.has(key) ? activeQuick.delete(key) : activeQuick.add(key);
    render();
    return;
  }
  if (activeQuick.has(key)) { activeQuick.delete(key); btn.classList.remove('active'); }
  else { activeQuick.add(key); btn.classList.add('active'); }
  render();
}

function setCat(btn) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  render();
}

function updateBadges() {
  const cats = ['전체', '제안', '수행', 'R&D', '기타'];
  cats.forEach(cat => {
    const el = document.getElementById('badge-' + cat);
    if (el) {
      el.textContent = cat === '전체' ? DATA.projects.length : DATA.projects.filter(p => p.category === cat).length;
    }
  });
}

function getFiltered() {
  let list = [...DATA.projects];

  if (currentCat !== '전체') list = list.filter(p => p.category === currentCat);

  if (activeQuick.has('weekly')) list = list.filter(p => p.weeklyUpdate);
  if (activeQuick.has('p1')) list = list.filter(p => p.priority === 1);
  if (activeQuick.has('urgent')) list = list.filter(p => {
    const d = daysDiff(p.deadline);
    return d !== null && d >= 0 && d <= 7;
  });
  if (activeQuick.has('active')) list = list.filter(p => ['진행중','수행'].includes(p.status));

  if (activeTags.size > 0) {
    list = list.filter(p => [...activeTags].every(t => (p.tags||[]).includes(t)));
  }

  const q = document.getElementById('search').value.trim().toLowerCase();
  if (q) list = list.filter(p =>
    p.title.toLowerCase().includes(q) || (p.client||'').toLowerCase().includes(q)
  );

  list.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'deadline') {
      av = av || '9999'; bv = bv || '9999';
    }
    if (sortKey === 'priority') {
      av = av ?? 99; bv = bv ?? 99;
    }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  return list;
}

function statusBadge(s) {
  return `<span class="badge-status s-${s}">${s}</span>`;
}

function catBadge(c) {
  return `<span class="badge-cat c-${CSS.escape(c)}">${c}</span>`;
}

function priorityCell(p) {
  if (!p) return '<span style="color:#cbd5e1">—</span>';
  const cls = 'p' + p;
  return `<span class="priority-dot ${cls}"></span>${p}순위`;
}

function deadlineCell(d) {
  if (!d) return '<span style="color:#cbd5e1">—</span>';
  const diff = daysDiff(d);
  let cls = 'deadline-chip';
  if (diff !== null && diff < 0) cls += ' urgent';
  else if (diff !== null && diff <= 7) cls += ' urgent';
  else if (diff !== null && diff <= 30) cls += ' soon';
  return `<span class="${cls}">${d}</span>`;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function makeLink(text) {
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function progressCell(p, id) {
  const txt = escHtml(p || '');
  return `<div class="progress-text collapsed" id="prog-${id}">${txt.replace(/\n/g,'<br>')}</div>
    ${txt.length > 60 ? `<button class="progress-toggle" onclick="toggleProgress(${id})">펼치기 ▾</button>` : ''}`;
}

function toggleProgress(id) {
  const el = document.getElementById('prog-' + id);
  const btn = el.nextElementSibling;
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    if (btn) btn.textContent = '접기 ▴';
  } else {
    el.classList.add('collapsed');
    if (btn) btn.textContent = '펼치기 ▾';
  }
}

function renderRow(p) {
  const tags = (p.tags||[]).map(t => `<span class="tag-mini">${escHtml(t)}</span>`).join('');
  return `<tr ondblclick="openEditModal(${p.id})" style="cursor:pointer">
    <td class="col-title">
      <div style="font-weight:600">${escHtml(p.title)}</div>
      ${tags ? `<div class="tags-cell">${tags}</div>` : ''}
    </td>
    <td class="col-client">${escHtml(p.client)}</td>
    <td class="col-category">${catBadge(p.category)}</td>
    <td class="col-status">${statusBadge(p.status)}</td>
    <td class="col-priority" style="white-space:nowrap">${priorityCell(p.priority)}</td>
    <td class="col-deadline">${deadlineCell(p.deadline)}</td>
    <td class="col-update">${p.weeklyUpdate ? '<span class="update-dot"></span>' : ''}</td>
    <td class="col-progress">
      ${progressCell(p.progress, p.id)}
      ${p.nextPlan ? `<div class="next-plan">→ ${escHtml(p.nextPlan)}</div>` : ''}
      ${p.notes ? `<div class="notes-text">${makeLink(escHtml(p.notes))}</div>` : ''}
    </td>
  </tr>`;
}

function render() {
  const list = getFiltered();
  const isGroup = activeQuick.has('group');

  document.getElementById('result-count').textContent = `${list.length}건 / 전체 ${DATA.projects.length}건`;

  const thead = `<thead><tr>
    <th class="col-title ${sortKey==='title'?'sorted':''}" onclick="setSort('title')">프로젝트명 <span class="sort-arrow">↕</span></th>
    <th class="col-client ${sortKey==='client'?'sorted':''}" onclick="setSort('client')">고객사 <span class="sort-arrow">↕</span></th>
    <th class="col-category">구분</th>
    <th class="col-status ${sortKey==='status'?'sorted':''}" onclick="setSort('status')">상태 <span class="sort-arrow">↕</span></th>
    <th class="col-priority ${sortKey==='priority'?'sorted':''}" onclick="setSort('priority')">순위 <span class="sort-arrow">↕</span></th>
    <th class="col-deadline ${sortKey==='deadline'?'sorted':''}" onclick="setSort('deadline')">기한 <span class="sort-arrow">↕</span></th>
    <th class="col-update" title="금주 업데이트">📌</th>
    <th class="col-progress">진행현황 / 향후계획</th>
  </tr></thead>`;

  if (list.length === 0) {
    document.getElementById('table-body').innerHTML = '<div class="empty-state">해당 조건의 프로젝트가 없습니다.</div>';
    return;
  }

  let html = '';

  if (isGroup) {
    const groups = {};
    list.forEach(p => {
      const key = p.client || '(고객사 없음)';
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });
    Object.keys(groups).sort().forEach(client => {
      html += `<div class="group-header">🏢 ${escHtml(client)} (${groups[client].length}건)</div>
        <table>${thead}<tbody>${groups[client].map(renderRow).join('')}</tbody></table>`;
    });
  } else {
    html = `<table>${thead}<tbody>${list.map(renderRow).join('')}</tbody></table>`;
  }

  document.getElementById('table-body').innerHTML = html;
  if (currentView === 'weekly') renderWeeklyView();
}

/* ── View Toggle ── */
function setView(v) {
  currentView = v;
  document.getElementById('btn-list-view').classList.toggle('active', v === 'list');
  document.getElementById('btn-weekly-view').classList.toggle('active', v === 'weekly');
  document.getElementById('list-wrap').classList.toggle('hide', v !== 'list');
  const ww = document.getElementById('weekly-wrap');
  if (v === 'weekly') { ww.classList.add('show'); renderWeeklyView(); }
  else ww.classList.remove('show');
}

/* ── Weekly View ── */
function getWeekStart(input) {
  const d = input ? new Date(typeof input === 'string' ? input + (input.length === 10 ? 'T00:00:00' : '') : input) : new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d.toISOString().slice(0, 10);
}

function getWeekLabel(weekStart) {
  const thisWeek = getWeekStart(null);
  const prevWeek = new Date(new Date(thisWeek + 'T00:00:00').getTime() - 7*86400000).toISOString().slice(0,10);
  const nextWeek = new Date(new Date(thisWeek + 'T00:00:00').getTime() + 7*86400000).toISOString().slice(0,10);
  const d = new Date(weekStart + 'T00:00:00');
  const end = new Date(d.getTime() + 6*86400000);
  const fmt = dt => `${dt.getMonth()+1}/${dt.getDate()}`;
  const range = `${fmt(d)}~${fmt(end)}`;
  if (weekStart === thisWeek) return `이번 주 (${range})`;
  if (weekStart === nextWeek) return `다음 주 (${range})`;
  if (weekStart === prevWeek) return `지난 주 (${range})`;
  return `${weekStart.slice(5)} (${range})`;
}

function renderWeeklyView() {
  const weekMap = {};
  DATA.projects.forEach(p => {
    (p.weeklyUpdates || []).forEach(wu => {
      const w = wu.weekOf || getWeekStart(null);
      if (!weekMap[w]) weekMap[w] = [];
      weekMap[w].push({ p, note: wu.note });
    });
    if (p.weeklyUpdate && (!p.weeklyUpdates || p.weeklyUpdates.length === 0)) {
      const w = getWeekStart(null);
      if (!weekMap[w]) weekMap[w] = [];
      weekMap[w].push({ p, note: p.progress || '' });
    }
  });

  const weeks = Object.keys(weekMap).sort().reverse();
  const thisWeek = getWeekStart(null);

  if (weeks.length === 0) {
    document.getElementById('weekly-body').innerHTML = '<div class="week-empty">주간 업데이트 내역이 없습니다.<br>프로젝트 편집 → 주간 업데이트 탭에서 추가하세요.</div>';
    return;
  }

  const html = weeks.map(week => {
    const isPast = week < thisWeek;
    const items = weekMap[week];
    return `<div class="week-section">
      <div class="week-header${isPast ? ' past' : ''}" onclick="toggleWeekSection(this)">
        <span class="week-label">📅 ${getWeekLabel(week)}</span>
        <span class="week-count">${items.length}건</span>
        <span class="week-toggle">▾</span>
      </div>
      <div class="week-body">
        <div style="display:grid;grid-template-columns:200px 110px 90px 1fr;gap:12px;padding:6px 16px;background:var(--bg);font-size:11px;font-weight:700;color:var(--text-muted);">
          <span>프로젝트</span><span>고객사</span><span>상태</span><span>업데이트 내용</span>
        </div>
        ${items.map(({p, note}) => `<div class="week-item" onclick="openEditModal(${p.id})">
          <div><div class="week-item-title">${escHtml(p.title)}</div></div>
          <div class="week-item-client">${escHtml(p.client||'—')}</div>
          <div>${statusBadge(p.status)}</div>
          <div class="week-item-note">${escHtml(note||'—')}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('weekly-body').innerHTML = html;
}

function toggleWeekSection(hdr) {
  const body = hdr.nextElementSibling;
  const arrow = hdr.querySelector('.week-toggle');
  body.classList.toggle('collapsed');
  arrow.textContent = body.classList.contains('collapsed') ? '▸' : '▾';
}

/* ── Weekly Update (Modal) ── */
function renderWUList() {
  const el = document.getElementById('wu-list');
  if (!el) return;
  if (modalWeeklyUpdates.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0">등록된 주간 업데이트가 없습니다.</div>';
    return;
  }
  el.innerHTML = modalWeeklyUpdates.map((wu, i) =>
    `<div class="weekly-update-item">
      <span class="wu-week">${wu.weekOf}</span>
      <span class="wu-note">${escHtml(wu.note)}</span>
      <button class="wu-del" onclick="removeWU(${i})">✕</button>
    </div>`
  ).join('');
}

function addWeeklyUpdate() {
  const dateEl = document.getElementById('f-wu-date');
  const noteEl = document.getElementById('f-wu-note');
  const note = noteEl.value.trim();
  if (!note) { noteEl.focus(); return; }
  const weekOf = dateEl.value ? getWeekStart(dateEl.value) : getWeekStart(null);
  modalWeeklyUpdates.push({ weekOf, note });
  modalWeeklyUpdates.sort((a,b) => b.weekOf.localeCompare(a.weekOf));
  noteEl.value = '';
  renderWUList();
}

function removeWU(idx) {
  modalWeeklyUpdates.splice(idx, 1);
  renderWUList();
}

/* ── Modal ── */
function openAddModal() {
  editingId = null;
  modalWeeklyUpdates = [];
  document.getElementById('modal-title').textContent = '프로젝트 추가';
  document.getElementById('btn-delete').style.display = 'none';
  ['title','client','owner','deadline','progress','nextplan','notes','wu-note'].forEach(f => {
    const el = document.getElementById('f-' + f);
    if (el) el.value = '';
  });
  const wuDate = document.getElementById('f-wu-date');
  if (wuDate) wuDate.value = getWeekStart(null);
  document.getElementById('f-category').value = '제안';
  document.getElementById('f-status').value = '진행중';
  document.getElementById('f-priority').value = '';
  document.getElementById('f-weekly').checked = false;
  renderWUList();
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const p = DATA.projects.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '프로젝트 수정';
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('f-title').value = p.title || '';
  document.getElementById('f-client').value = p.client || '';
  document.getElementById('f-category').value = p.category || '제안';
  document.getElementById('f-status').value = p.status || '진행중';
  document.getElementById('f-priority').value = p.priority || '';
  document.getElementById('f-deadline').value = p.deadline || '';
  document.getElementById('f-owner').value = p.owner || '';
  document.getElementById('f-weekly').checked = p.weeklyUpdate || false;
  document.getElementById('f-progress').value = p.progress || '';
  document.getElementById('f-nextplan').value = p.nextPlan || '';
  document.getElementById('f-notes').value = p.notes || '';
  modalWeeklyUpdates = JSON.parse(JSON.stringify(p.weeklyUpdates || []));
  const wuDate = document.getElementById('f-wu-date');
  if (wuDate) wuDate.value = getWeekStart(null);
  const wuNote = document.getElementById('f-wu-note');
  if (wuNote) wuNote.value = '';
  renderWUList();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveProject() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('프로젝트명을 입력하세요.'); return; }

  const obj = {
    title,
    client: document.getElementById('f-client').value.trim(),
    category: document.getElementById('f-category').value,
    tags: [],
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value ? parseInt(document.getElementById('f-priority').value) : null,
    deadline: document.getElementById('f-deadline').value || '',
    owner: document.getElementById('f-owner').value.trim() || null,
    weeklyUpdate: document.getElementById('f-weekly').checked,
    progress: document.getElementById('f-progress').value.trim(),
    nextPlan: document.getElementById('f-nextplan').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    weeklyUpdates: [...modalWeeklyUpdates]
  };

  if (editingId) {
    const idx = DATA.projects.findIndex(p => p.id === editingId);
    if (idx >= 0) {
      obj.id = editingId;
      obj.tags = DATA.projects[idx].tags || [];
      DATA.projects[idx] = obj;
    }
  } else {
    obj.id = Math.max(0, ...DATA.projects.map(p => p.id)) + 1;
    DATA.projects.push(obj);
  }

  DATA.lastUpdated = new Date().toISOString().slice(0,10);
  document.getElementById('last-updated').textContent = '최종 업데이트: ' + DATA.lastUpdated;
  markUnsaved();
  updateBadges();
  render();
  closeModal();
}

function deleteProject() {
  if (!editingId) return;
  if (!confirm('이 프로젝트를 삭제하시겠습니까?')) return;
  DATA.projects = DATA.projects.filter(p => p.id !== editingId);
  markUnsaved();
  updateBadges();
  render();
  closeModal();
}

let hasUnsaved = false;

function markUnsaved() {
  hasUnsaved = true;
  document.getElementById('unsaved-badge').classList.add('show');
}

function exportJSON() {
  const now = new Date();
  const ts = now.getFullYear().toString() +
    String(now.getMonth()+1).padStart(2,'0') +
    String(now.getDate()).padStart(2,'0') + '-' +
    String(now.getHours()).padStart(2,'0') +
    String(now.getMinutes()).padStart(2,'0');

  DATA.lastUpdated = now.toISOString().slice(0,10);
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `data-${ts}.json`;
  a.click();
  URL.revokeObjectURL(a.href);

  hasUnsaved = false;
  document.getElementById('unsaved-badge').classList.remove('show');
  document.getElementById('last-updated').textContent = '최종 업데이트: ' + DATA.lastUpdated;
}

loadData();
</script>
</body>
</html>
